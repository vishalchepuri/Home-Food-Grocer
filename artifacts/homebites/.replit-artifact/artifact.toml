kind = "web"
previewPath = "/"
title = "HomeBites"
version = "1.0.0"
id = "artifacts/homebites"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24151

[services.development]
run = "pnpm --filter @workspace/homebites run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/homebites", "run", "build" ]
publicDir = "artifacts/homebites/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24151"
BASE_PATH = "/"
